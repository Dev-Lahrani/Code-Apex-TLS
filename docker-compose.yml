version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: zerotrust
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d zerotrust"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://dev:dev123@postgres:5432/zerotrust
      BLOCKCHAIN_CHAIN_ID: 1
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./tls_frontend
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://${PUBLIC_IP:-localhost}:8000"
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://${PUBLIC_IP:-localhost}:8000"
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
