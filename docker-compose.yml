version: "3.9"

services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zerotrust}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-zerotrust}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://dev:dev123@postgres:5432/zerotrust}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./tls_frontend
      dockerfile: Dockerfile.frontend
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
